name: CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install lint/type tools
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check grimaur tests/
      - name: Ruff format
        run: ruff format --check grimaur tests/
      - name: Type check
        run: mypy grimaur tests/
      # discover via unittest so CI needs no pytest dependency
      - name: Unit tests
        run: python -m unittest discover -s tests -t tests -v

  smoke:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      options: --privileged

    env:
      PKG: yay
      PATTERN: python

    defaults:
      run:
        shell: sudo -H -u builder --preserve-env=PKG,PATTERN,DEBUG bash -eo pipefail {0}

    steps:
      - uses: actions/checkout@v4
        # checkout runs before our default shell takes effect

      - run: pacman-key --init
        shell: bash
      - run: pacman --noconfirm -Sy archlinux-keyring
        shell: bash
      - run: pacman --noconfirm -S --needed git python base-devel
        shell: bash

      - name: Setup builder user
        shell: bash
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
# setup done; all steps below run as builder via defaults.run.shell
      - run: ./grimaur --help
      - run: ./grimaur fetch $PKG
      - run: ./grimaur --refresh fetch $PKG
      - run: ./grimaur fetch --force $PKG

      - name: Shallow clone is depth=1
        run: |
          rm -rf ~/.cache/aurgit
          ./grimaur --shallow fetch $PKG
          count=$(git -C ~/.cache/aurgit/$PKG rev-list --count HEAD)
          [ "$count" = "1" ]; echo "got $count, test pass." || { echo "expected 1, got $count"; exit 1; }

      - run: ./grimaur --git-mirror fetch --force $PKG
      - run: ./grimaur fetch --force $PKG --git-mirror
      - run: ./grimaur --git-mirror update --noconfirm
      - run: ./grimaur inspect $PKG --target PKGBUILD

      - name: Search unbounded (timed)
        run: time ./grimaur search $PATTERN --no-interactive

      - name: Test --use-ssh rewrites URLs (clone fails, but rewrite worked)
        env:
          DEBUG: "1"
        run: |
          ./grimaur fetch archinstoo --use-ssh --shallow --repo-url https://github.com/h8d13/archinstoo 2>&1 | tee /tmp/ssh.log || true
          grep -qF 'ssh://git@github.com/h8d13/archinstoo' /tmp/ssh.log; echo "URL re-written PASS." \
            || { echo "FAIL: --use-ssh did not rewrite URL to ssh://"; exit 1; }

      - name: Install via grimaur (as builder)
        run: ./grimaur install $PKG --noconfirm

      - run: ./grimaur list
